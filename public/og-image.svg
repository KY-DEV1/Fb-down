  <path d="M128 244 L128 268" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M113 260 L128 275 L143 260" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
