  <rect x="720" y="160" width="400" height="280" rx="20" fill="#0f0f1a" stroke="#252540" stroke-width="1.5"/>
  <rect x="720" y="160" width="400" height="280" rx="20" fill="url(#glow1)" opacity="0.15"/>

