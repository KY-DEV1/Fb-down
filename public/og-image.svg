  <text x="762" y="280" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#e2e2f0">1080p</text>
  <text x="762" y="298" font-family="monospace" font-size="11" fill="#5a5a7a">60fps · 142 MB</text>
  <rect x="762" y="308" width="132" height="16" rx="4" fill="#06d6a0"/>
  <text x="828" y="320" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#000" text-anchor="middle">Download</text>

  <rect x="920" y="254" width="152" height="80" rx="10" fill="#16162a" stroke="#252540" stroke-width="1"/>
  <text x="934" y="280" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#e2e2f0">720p</text>
  <text x="934" y="298" font-family="monospace" font-size="11" fill="#5a5a7a">30fps · 74 MB</text>
  <rect x="934" y="308" width="124" height="16" rx="4" fill="#1e1e35" stroke="#252540" stroke-width="1"/>
  <text x="996" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b8a" text-anchor="middle">Download</text>

  <!-- Audio bar mock -->
  <rect x="748" y="348" width="344" height="56" rx="10" fill="#16162a" stroke="#252540" stroke-width="1"/>
  <rect x="762" y="362" width="28" height="28" rx="6" fill="#1e1e35" stroke="#a855f7" stroke-width="1"/>
  <text x="776" y="381" font-family="sans-serif" font-size="14" text-anchor="middle">🎵</text>
  <text x="800" y="376" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e2e2f0">MP3 Audio Extract</text>
  <text x="800" y="392" font-family="monospace" font-size="10" fill="#5a5a7a">128kbps · No video</text>
  <rect x="1008" y="358" width="72" height="28" rx="6" fill="#a855f7"/>
  <text x="1044" y="377" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">MP3</text>

  <!-- Shine line on card -->
  <line x1="720" y1="200" x2="1120" y2="200" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
