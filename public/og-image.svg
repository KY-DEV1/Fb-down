    <tspan fill="#e2e2f0"> &amp; </tspan>
    <tspan fill="#a855f7">Reels</tspan>
  </text>

  <!-- Subtitle -->
  <text x="88" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6b6b8a" letter-spacing="0">Free · No login · HD quality · MP3 audio</text>

