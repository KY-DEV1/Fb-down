# nixpacks.toml
# Railway pakai Nixpacks sebagai build system.
# File ini memastikan ffmpeg tersedia saat build & runtime.

[phases.setup]
nixPkgs = ["ffmpeg", "curl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "node scripts/download-ytdlp.js",
  "npm run build"
]

[start]
cmd = "npm start"
